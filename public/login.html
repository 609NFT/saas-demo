<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in · SaaS Starter</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body class="auth-page">
<header class="nav">
  <a class="brand" href="/">SaaS Starter</a>
  <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true" tabindex="-1" />
  <label class="nav-burger" for="nav-toggle" aria-label="Toggle navigation"><span></span><span></span><span></span></label>
  <nav>
    <a href="/signup.html">Sign up</a>
  </nav>
</header>

<main class="auth-shell">
  <div class="auth-brand">
    <span class="auth-mark" aria-hidden="true"></span>
  </div>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="muted small">Log in to your account to continue.</p>
    <form id="login-form" autocomplete="on">
      <label>Email <input type="email" name="email" required autocomplete="email" placeholder="you@example.com" /></label>
      <label>Password <input type="password" name="password" required autocomplete="current-password" placeholder="Your password" /></label>
      <button class="btn primary lg" type="submit">Log in</button>
      <div class="form-error" id="login-error" hidden></div>
    </form>
    <p class="muted small auth-alt">No account yet? <a href="/signup.html">Sign up free</a></p>
  </div>
</main>

<script src="/app.js"></script>
<script>app.bindLoginForm();</script>
</body>
</html>
